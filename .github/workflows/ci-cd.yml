name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Smoke test application load
        run: node -e "require('./app')"

  deploy:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
      DO_APP_ID: ${{ secrets.DO_APP_ID }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Validate DigitalOcean secrets
        run: |
          if [ -z "$DO_API_TOKEN" ] || [ -z "$DO_APP_ID" ]; then
            echo "::error::Missing DO_API_TOKEN or DO_APP_ID repository secret. Add both in GitHub Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Set up doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Trigger DigitalOcean App Platform deployment
        run: doctl apps create-deployment "$DO_APP_ID"
